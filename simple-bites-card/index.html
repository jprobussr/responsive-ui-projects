<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Bites Card</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="layout">
      <article class="recipe-card">
        <div class="recipe-card__content">
          <h1 class="recipe-card__title">Keeping cooking simple</h1>

          <p class="recipe-card__text">
            Food is a very important part of everyone’s life. If you want to be
            healthy, you have to eat healthy. One of the easiest ways to do that
            is to keep your cooking nice and simple.
          </p>

          <a href="#" class="recipe-card__link">Continue Reading</a>
        </div>

        <div class="recipe-card__media">
          <img
            src="./images/slide-img-4.jpg"
            alt="Food Image"
            class="recipe-card__image"
          />
        </div>

        <p class="recipe-card__meta">March 11, 2026 | 3 comments</p>
      </article>
    </main>
  </body>
</html>
